version: '3.8'

# Override file for development mode
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend-dev:
    profiles: [] # Enable by default when using this compose file

  backend-worker-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: oyana-backend-worker-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-oyana_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PREMBLY_RAW_PAYLOAD_CLEANUP_ENABLED: ${PREMBLY_RAW_PAYLOAD_CLEANUP_ENABLED:-true}
      PREMBLY_RAW_PAYLOAD_CLEANUP_INTERVAL_MINUTES: ${PREMBLY_RAW_PAYLOAD_CLEANUP_INTERVAL_MINUTES:-360}
      DISPATCH_RECONCILE_INTERVAL_SECONDS: ${DISPATCH_RECONCILE_INTERVAL_SECONDS:-120}
      DISPATCH_WORKER_BATCH_SIZE: ${DISPATCH_WORKER_BATCH_SIZE:-100}
    networks:
      - oyana-network
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:worker:dev
    profiles: []

  backend:
    profiles:
      - production # Disable production backend in dev mode

  backend-worker:
    profiles:
      - production # Disable production worker in dev mode
