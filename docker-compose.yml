version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: oyana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-oyana_db}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oyana-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for GraphQL subscriptions
  redis:
    image: redis:7-alpine
    container_name: oyana-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - oyana-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: oyana-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3500}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-oyana_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-this}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
    ports:
      - '${PORT:-3500}:3500'
    networks:
      - oyana-network
    volumes:
      - ./prisma:/app/prisma
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

  # BullMQ Worker (dispatch + maintenance)
  backend-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: oyana-backend-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-oyana_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      PREMBLY_RAW_PAYLOAD_CLEANUP_ENABLED: ${PREMBLY_RAW_PAYLOAD_CLEANUP_ENABLED:-true}
      PREMBLY_RAW_PAYLOAD_CLEANUP_INTERVAL_MINUTES: ${PREMBLY_RAW_PAYLOAD_CLEANUP_INTERVAL_MINUTES:-360}
      DISPATCH_RECONCILE_INTERVAL_SECONDS: ${DISPATCH_RECONCILE_INTERVAL_SECONDS:-120}
      DISPATCH_WORKER_BATCH_SIZE: ${DISPATCH_WORKER_BATCH_SIZE:-100}
    networks:
      - oyana-network
    command: node dist/src/worker.js

  # Development mode (optional - use docker-compose -f docker-compose.yml -f docker-compose.dev.yml up)
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: oyana-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3500}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-oyana_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-this}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
    ports:
      - '${PORT:-3500}:3500'
    networks:
      - oyana-network
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    profiles:
      - dev

networks:
  oyana-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
