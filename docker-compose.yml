services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: oyana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oyana}
      POSTGRES_USER: ${POSTGRES_USER:-oyana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oyana_dev_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oyana-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-oyana} -d ${POSTGRES_DB:-oyana}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for GraphQL subscriptions & BullMQ
  redis:
    image: redis:7-alpine
    container_name: oyana-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - oyana-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  backend:
    image: oyana-backend:local
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: oyana-backend
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3500}
      DATABASE_URL: postgresql://${POSTGRES_USER:-oyana}:${POSTGRES_PASSWORD:-oyana_dev_password}@postgres:5432/${POSTGRES_DB:-oyana}
      DIRECT_URL: postgresql://${POSTGRES_USER:-oyana}:${POSTGRES_PASSWORD:-oyana_dev_password}@postgres:5432/${POSTGRES_DB:-oyana}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '${PORT:-3500}:3500'
    networks:
      - oyana-network
    volumes:
      - ./prisma:/app/prisma
    command: node dist/src/main.js

  # BullMQ Worker (dispatch + maintenance)
  worker:
    image: oyana-backend:local
    pull_policy: never
    container_name: oyana-worker
    restart: unless-stopped
    env_file:
      - ./.env
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-oyana}:${POSTGRES_PASSWORD:-oyana_dev_password}@postgres:5432/${POSTGRES_DB:-oyana}
      DIRECT_URL: postgresql://${POSTGRES_USER:-oyana}:${POSTGRES_PASSWORD:-oyana_dev_password}@postgres:5432/${POSTGRES_DB:-oyana}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - oyana-network
    command: node dist/src/worker.js

networks:
  oyana-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
