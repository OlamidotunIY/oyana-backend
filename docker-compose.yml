services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: oyana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oyana}
      POSTGRES_USER: ${POSTGRES_USER:-oyana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oyana_dev_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oyana-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-oyana} -d ${POSTGRES_DB:-oyana}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for GraphQL subscriptions & BullMQ
  redis:
    image: redis:7-alpine
    container_name: oyana-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - oyana-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  backend:
    image: oyana-backend:local
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: oyana-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3500}
      DATABASE_URL: ${DATABASE_URL:-postgresql://oyana:oyana_dev_password@postgres:5432/oyana}
      DIRECT_URL: ${DIRECT_URL:-postgresql://oyana:oyana_dev_password@postgres:5432/oyana}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID}
      GOOGLE_CLOUD_KEY_FILENAME: ${GOOGLE_CLOUD_KEY_FILENAME}
      GOOGLE_CLOUD_CLIENT_EMAIL: ${GOOGLE_CLOUD_CLIENT_EMAIL}
      GOOGLE_CLOUD_PRIVATE_KEY: ${GOOGLE_CLOUD_PRIVATE_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-Oyana <noreply@oyana.com>}
      STORAGE_BUCKET_NAME: ${STORAGE_BUCKET_NAME:-oyana-storage}
      PREMBLY_KYC_BUCKET: ${PREMBLY_KYC_BUCKET:-kyc-verifications}
      PREMBLY_KYC_UPLOAD_URL_TTL_SECONDS: ${PREMBLY_KYC_UPLOAD_URL_TTL_SECONDS:-900}
    ports:
      - '${PORT:-3500}:3500'
    networks:
      - oyana-network
    volumes:
      - ./prisma:/app/prisma
    command: node dist/src/main.js

  # BullMQ Worker (dispatch + maintenance)
  worker:
    image: oyana-backend:local
    pull_policy: never
    container_name: oyana-worker
    restart: unless-stopped
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://oyana:oyana_dev_password@postgres:5432/oyana}
      DIRECT_URL: ${DIRECT_URL:-postgresql://oyana:oyana_dev_password@postgres:5432/oyana}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PREMBLY_RAW_PAYLOAD_CLEANUP_ENABLED: ${PREMBLY_RAW_PAYLOAD_CLEANUP_ENABLED:-true}
      PREMBLY_RAW_PAYLOAD_CLEANUP_INTERVAL_MINUTES: ${PREMBLY_RAW_PAYLOAD_CLEANUP_INTERVAL_MINUTES:-360}
      DISPATCH_RECONCILE_INTERVAL_SECONDS: ${DISPATCH_RECONCILE_INTERVAL_SECONDS:-120}
      DISPATCH_WORKER_BATCH_SIZE: ${DISPATCH_WORKER_BATCH_SIZE:-100}
      DISPATCH_RECONCILE_DB_MAX_RETRIES: ${DISPATCH_RECONCILE_DB_MAX_RETRIES:-4}
      DISPATCH_RECONCILE_DB_BASE_DELAY_MS: ${DISPATCH_RECONCILE_DB_BASE_DELAY_MS:-500}
    networks:
      - oyana-network
    command: node dist/src/worker.js

networks:
  oyana-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
